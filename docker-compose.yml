services:
  postgres:
    image: postgres:16-alpine
    container_name: minibank-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - minibank_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: minibank-redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - minibank_redis:/data

volumes:
  minibank_postgres:
  minibank_redis: